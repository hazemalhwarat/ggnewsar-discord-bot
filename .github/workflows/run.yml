name: GGNewsAR Discord Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"   # كل 15 دقيقة — عدّل الرقم لو تبي أسرع أو أبطأ

permissions:
  contents: write   # مطلوب عشان يقدر يعمل commit/push لـ state.json

concurrency:
  group: ggnewsar-discord-bot
  cancel-in-progress: false   # ما نبي نلغي رن شغال لو الجديد بدأ قبل ما يخلص القديم

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # حماية إضافية: أي تعليق غير متوقع يوقف تلقائي بدل ما يفضل شغال لساعات
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot (single pass)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # اختياري: ويبهوك مستقل لقناة #transfers. لو ما ضفته، الانتقالات
          # بتنزل بنفس قناة الأخبار.
          TRANSFERS_WEBHOOK_URL: ${{ secrets.TRANSFERS_WEBHOOK_URL }}
          # اختياري: ويبهوك مستقل لقناة الرعايات والبزنس. لو ما ضفته، أخبار
          # الرعايات/الشراكات/الاستثمار بتنزل بنفس قناة الأخبار العامة.
          SPONSORSHIP_WEBHOOK_URL: ${{ secrets.SPONSORSHIP_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py
